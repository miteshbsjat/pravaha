version: '3.8'

services:
  pravaha-producer:
    build: ./pravaha-producer
    container_name: pravaha-producer
    ports:
      - "8060:8060"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka1:9092
    extra_hosts:
      - "kafka1:172.20.0.2"
      - "kafka2:172.20.0.3"
      - "kafka3:172.20.0.4"

  pravaha-consumer:
    build: ./pravaha-consumer
    container_name: pravaha-consumer
    ports:
      - "8070:8070"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka1:9092
    extra_hosts:
      - "kafka1:172.20.0.2"
      - "kafka2:172.20.0.3"
      - "kafka3:172.20.0.4"
